<!-- Interaction Points (Overall) -->

<span class="material-symbols-outlined">query_stats</span>

<span class="material-symbols-outlined">settings</span>
<span class="font-label-sm text-label-sm">Settings</span>
</a>

<script>
        const toggleBtn = document.getElementById('toggle-overall');
        const categoryLayers = document.getElementById('category-layers');
        const overallPath = document.getElementById('overall-path');
        let isOverallOnly = true;

        toggleBtn.addEventListener('click', () => {
            isOverallOnly = !isOverallOnly;
            
            if (isOverallOnly) {
                categoryLayers.classList.add('category-muted');
                toggleBtn.classList.add('bg-secondary-container', 'text-on-secondary-container');
                toggleBtn.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
                toggleBtn.querySelector('.material-symbols-outlined').textContent = 'visibility';
                overallPath.setAttribute('stroke-width', '4');
            } else {
                categoryLayers.classList.remove('category-muted');
                toggleBtn.classList.remove('bg-secondary-container', 'text-on-secondary-container');
                toggleBtn.classList.add('bg-surface-container-high', 'text-on-surface-variant');
                toggleBtn.querySelector('.material-symbols-outlined').textContent = 'visibility_off';
                overallPath.setAttribute('stroke-width', '2');
            }
        });

        // Simple parallax or entry animation for legend cards
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('translate-y-0', 'opacity-100');
                    entry.target.classList.remove('translate-y-4', 'opacity-0');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.snap-center').forEach(card => {
            card.classList.add('transition-all', 'duration-500', 'translate-y-4', 'opacity-0');
            observer.observe(card);
        });
    </script>
