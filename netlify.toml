# Netlify build + deploy config for the Zenith Vite SPA.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite requires Node 20.19+ or 22.12+
  NODE_VERSION = "22"

# Single-page-app fallback: serve index.html for client-side routes
# (/plan, /charts, /weights) so deep links and refreshes don't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
